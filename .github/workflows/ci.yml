name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: cc
          - os: windows-latest
            cc: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: go build ./...

      - name: Test
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: go test ./...

  integration:
    name: Integration (linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test (integration + e2e)
        shell: bash
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: go test -p 1 -tags "integration e2e" ./...
