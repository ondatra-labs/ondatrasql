name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - uses: contributor-assistant/github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: main
          allowlist: webmarcus
          remote-organization-name: ""
          remote-repository-name: ""
          create-file-commit-message: "chore: create CLA signature file"
          signed-commit-message: "$contributorName has signed the CLA"
          custom-notsigned-prcomment: |
            Thanks for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            To sign, please reply with the following comment:

            > I have read the CLA Document and I hereby sign the CLA.

            You only need to do this once.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA."
          lock-pullrequest-aftermerge: false
